trigger:
- main

resources:
- repo: self

variables: # <---------------------- AGREGA LAS VARIABLES
  - group: CICD

parameters:
  - name: tag
    default: "$(Build.BuildId)"
  - name: imageName
    default: 'demo-page'

stages:
- stage: CICD
  displayName: CICD workflow
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:

    - script: |
        echo "var=$(appVersion)"
        echo "tag= ${{ parameters.tag }}"

    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        arguments: '--build-arg VERSION=$(appVersion)'
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs: 
        command: push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }}    

  - job: Deploy
    displayName: Deploy
    dependsOn: Build
    pool: local-agent
    steps:
      - task: AzureContainerApps@1

        inputs: 
          azureSubscription: 'appDeployConnection'
          imageToDeploy: acrappsluhidalg.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}
          containerAppname: 'app-demo-page'
          resourceGroup: rg-devops

          acrUsername: $(acrUsername)
          acrPassword: $(acrPassword)