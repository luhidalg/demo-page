trigger:
- main

resources:
- repo: self

variables: # <---------------------- AGREGA LAS VARIABLES
  - group: CICD

parameters:
  - name: tag
    default: "$(Build.BuildId)"
  - name: imageName
    default: 'demo-page'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool: local-agent

    steps:

    - script: |
        echo "var=$(appVersion)"
        echo "tag= ${{ parameters.tag }}"

    - task: Docker@2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName }}
        command: build
        dockerfile: '**/Dockerfile'
        tags: ${{ parameters.tag }}
        arguments: '--build-arg VERSION=$(appVersion)'
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs: 
        command: push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName }}
        tags: ${{ parameters.tag }}    
